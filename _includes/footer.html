{% include base_path %}

<div class="site-footer-compact">
  <span>&copy; {{ site.time | date: '%Y' }} {{ site.author.name | default: site.name | default: site.title }}</span>
  <span>LMD-IPSL / ENS-PSL</span>
  {% if site.author.github %}
    <a href="https://github.com/{{ site.author.github }}"><i class="fab fa-github" aria-hidden="true"></i> GitHub</a>
  {% endif %}
  {% if site.author.email %}
    <a href="mailto:{{ site.author.email }}">Email</a>
  {% endif %}
</div>
