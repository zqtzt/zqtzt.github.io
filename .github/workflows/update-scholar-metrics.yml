name: Update Scholar metrics

on:
  schedule:
    - cron: "0 3 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch Google Scholar metrics
        run: python scripts/update_scholar_metrics.py

      - name: Commit updated metrics
        run: |
          if git diff --quiet -- assets/data/scholar-metrics.json; then
            echo "Scholar metrics unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/scholar-metrics.json
          git commit -m "Update Scholar metrics"
          git push
